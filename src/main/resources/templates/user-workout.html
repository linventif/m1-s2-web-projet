<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Liste des Activité</title>
  <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css">
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="min-h-screen bg-base-200 text-base-content">
  <main class="mx-auto flex min-h-screen w-full max-w-6xl flex-col px-4 py-6 sm:px-6 lg:px-8">
    <section class="card border border-base-300 bg-base-100 shadow-xl">
      <div class="card-body gap-6 p-6 sm:p-8">
        <div class="space-y-4">
            <h2 class="text-2xl font-bold text-slate-950">Toutes les activité</h2>

            <div class="alert alert-info" th:if="${#lists.isEmpty(workout)}">
                <span>Aucune activité a afficher.</span>
            </div>

            <div class="overflow-x-auto rounded-box border border-base-300" th:if="${!#lists.isEmpty(workout)}">
                <table class="table table-zebra">
                    <thead>
                        <tr>
                            <th>Utilisateur</th>
                            <th>Date</th>
                            <th>Sport</th>
                            <th>Durée</th>
                            <th>Distance</th>
                            <th>Calorie Bruler</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="workout : ${workout}">
                          <td th:text="${workout.user.getName}"></td>
                          <td th:text="${workout.date}"></td>
                          <td th:text="${workout.sport.getName}"></td>
                          <td>
                            <i th:text="${workout.duration}"/>
                            s
                          </td>
                          <td>
                            <i th:text="${workout.distance}"/>
                            km
                          </td>
                          <td>
                            <i th:text="${workout.getCalorieBurn}"/>
                            kal
                          </td>
                            <!-- <td th:text="${conference.idconf}"></td>
                            <td class="font-semibold" th:text="${conference.titleconf}"></td>
                            <td th:text="${conference.nbeditionconf}"></td>
                            <td th:text="${conference.dtstartconf}"></td>
                            <td th:text="${conference.dtendconf}"></td>
                            <td>
                                <span class="text-base-content/50" th:if="${#sets.isEmpty(conference.thematiques)}">-</span>
                                <ul class="flex flex-wrap gap-2" th:if="${!#sets.isEmpty(conference.thematiques)}">
                                    <li th:each="thematique : ${conference.thematiques}">
                                        <span class="badge badge-outline badge-secondary" th:text="${thematique.nomThematique}">Thematique</span>
                                    </li>
                                </ul>
                            </td>
                            <td>
                                <span class="text-base-content/50" th:if="${conference.urlwebsiteconf == null || conference.urlwebsiteconf.isBlank()}">-</span>
                                <a class="link link-primary break-all"
                                    th:if="${conference.urlwebsiteconf != null && !conference.urlwebsiteconf.isBlank()}"
                                    th:href="${conference.urlwebsiteconf}"
                                    th:text="${conference.urlwebsiteconf}"
                                    target="_blank"
                                    rel="noreferrer"></a>
                            </td> -->
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

        <div class="flex gap-10 ">
          <div class="flex gap-2">
          <a class="btn btn-outline group-item" th:href="@{/users/profile}">Profil</a>
          <a class="btn btn-outline group-item" th:href="@{/users/friends}">Amis</a>
          <a class="btn btn-outline group-item" th:href="@{/users/users}">Utilisateurs</a>
          <a class="btn btn-outline group-item" th:href="@{/users/workout}">Activités</a>
          </div>
          <div class="flex gap-2">
              <a class="btn btn-outline" th:href="@{/users/login}">Se Connecter</a>
              <a class="btn btn-outline" th:href="@{/users/create}">Créer un Compte</a>
          </div>
        </div>
      </div>
    </section>
  </main>
</body>
</html>
