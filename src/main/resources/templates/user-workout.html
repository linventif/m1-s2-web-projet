<!doctype html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
  <head th:replace="~{components/layout::head(title='Liste des Activité')}">
    <title>Liste des Activité</title>
  </head>

  <body class="min-h-screen bg-base-200 text-base-content">
    <div th:insert="~{components/layout::header}"></div>
    <main
      class="mx-auto flex min-h-screen w-full max-w-6xl flex-col px-4 pb-6 pt-24 sm:px-6 lg:px-8"
    >
      <section class="card border border-base-300 bg-base-100 shadow-xl">
        <div class="card-body gap-6 p-6 sm:p-8">
          <div class="space-y-4">
            <h2 class="text-2xl font-bold text-slate-950">Toutes les activité</h2>

            <div class="alert alert-info" th:if="${#lists.isEmpty(workouts)}">
              <span>Aucune activité a afficher.</span>
            </div>

            <div
              class="overflow-x-auto rounded-box border border-base-300"
              th:if="${!#lists.isEmpty(workouts)}"
            >
              <table class="table table-zebra">
                <thead>
                  <tr>
                    <th>Utilisateur</th>
                    <th>Date</th>
                    <th>Sport</th>
                    <th>Durée</th>
                    <th>Distance</th>
                    <th>Calorie Bruler</th>
                    <th>Badges débloqués</th>
                  </tr>
                </thead>
                <tbody>
                  <tr th:each="workout : ${workouts}">
                    <td>
                      <span th:replace="~{components/user::nameLink(user=${workout.user})}"></span>
                    </td>
                    <td th:text="${workout.date}"></td>
                    <td th:text="${workout.sport.name}"></td>
                    <td>
                      <i th:text="${workout.duration}"></i>
                      s
                    </td>
                    <td>
                      <i th:text="${workout.distance}"></i>
                      km
                    </td>
                    <td>
                      <i th:text="${workout.getCalorieBurn}"></i>
                      kal
                    </td>
                    <td>
                      <div
                        class="flex flex-wrap items-center gap-2"
                        th:if="${!#lists.isEmpty(unlockedBadgesByWorkoutId[workout.id])}"
                      >
                        <div
                          class="tooltip"
                          th:each="badge : ${unlockedBadgesByWorkoutId[workout.id]}"
                          th:attr="data-tip=${badge.name}"
                        >
                          <img
                            th:src="${badge.iconPath}"
                            th:alt="${badge.name}"
                            class="h-8 w-8 rounded-md object-cover"
                          />
                        </div>
                      </div>
                      <span
                        class="text-base-content/50"
                        th:if="${#lists.isEmpty(unlockedBadgesByWorkoutId[workout.id])}"
                        >-</span
                      >
                    </td>
                    <!-- <td th:text="${conference.idconf}"></td>
                            <td class="font-semibold" th:text="${conference.titleconf}"></td>
                            <td th:text="${conference.nbeditionconf}"></td>
                            <td th:text="${conference.dtstartconf}"></td>
                            <td th:text="${conference.dtendconf}"></td>
                            <td>
                                <span class="text-base-content/50" th:if="${#sets.isEmpty(conference.thematiques)}">-</span>
                                <ul class="flex flex-wrap gap-2" th:if="${!#sets.isEmpty(conference.thematiques)}">
                                    <li th:each="thematique : ${conference.thematiques}">
                                        <span class="badge badge-outline badge-secondary" th:text="${thematique.nomThematique}">Thematique</span>
                                    </li>
                                </ul>
                            </td>
                            <td>
                                <span class="text-base-content/50" th:if="${conference.urlwebsiteconf == null || conference.urlwebsiteconf.isBlank()}">-</span>
                                <a class="link link-primary break-all"
                                    th:if="${conference.urlwebsiteconf != null && !conference.urlwebsiteconf.isBlank()}"
                                    th:href="${conference.urlwebsiteconf}"
                                    th:text="${conference.urlwebsiteconf}"
                                    target="_blank"
                                    rel="noreferrer"></a>
                            </td> -->
                  </tr>
                </tbody>
              </table>
            </div>
          </div>
        </div>
      </section>
    </main>
    <div th:insert="~{components/layout::footer}"></div>
  </body>
</html>
