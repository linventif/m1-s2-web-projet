<!doctype html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{components/layout::head(title='Toutes les activités')}">
  <title>Toutes les activités</title>
</head>

<body class="min-h-screen bg-base-200 text-base-content">
<div th:insert="~{components/layout::header}"></div>
<main
  class="mx-auto flex min-h-screen w-full max-w-6xl flex-col px-4 pb-6 pt-24 sm:px-6 lg:px-8"
>
  <section class="card border border-base-300 bg-base-100 shadow-xl">
    <div class="card-body gap-6 p-6 sm:p-8">
      <div class="space-y-4">
        <h2 class="text-2xl font-bold text-slate-950">Toutes les activités</h2>

        <div class="alert alert-info alert-outline" th:if="${#lists.isEmpty(workouts)}">
          <span>Aucune activité à afficher.</span>
        </div>

        <div th:insert="~{components/dashboard-center}"></div>
      </div>
    </div>
  </section>
</main>


<div th:insert="~{components/layout::footer}"></div>
</body>
</html>
