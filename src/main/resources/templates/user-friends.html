<!doctype html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
  <head th:replace="~{components/layout::head(title='Mes amis')}">
    <title>Mes amis</title>
  </head>

  <body class="min-h-screen bg-base-200 text-base-content">
    <div th:insert="~{components/layout::header}"></div>
    
    <main class="mx-auto w-full max-w-7xl px-4 pb-6 pt-24 sm:px-6 lg:px-8">
      
      <div class="mb-6 space-y-2">
        <div class="alert alert-success shadow-lg" th:if="${message}">
          <svg xmlns="http://www.w3.org/2000/center" class="h-6 w-6 shrink-0 stroke-current" fill="none" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>
          <span th:text="${message}">Action effectuée.</span>
        </div>
        <div class="alert alert-error shadow-lg" th:if="${errorMessage}">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 shrink-0 stroke-current" fill="none" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 14l2-2m0 0l2-2m-2 2l-2-2m2 2l2 2m7-2a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>
          <span th:text="${errorMessage}">Échec.</span>
        </div>
      </div>

      <div class="flex flex-col lg:flex-row gap-6">
        
        <div class="flex-grow lg:w-2/3 space-y-6">
          <section class="card border border-base-300 bg-base-100 shadow-sm">
            <div class="card-body p-6">
              <h2 class="card-title text-xl text-primary mb-4">Trouver des athlètes</h2>
              
              <form th:action="@{/users/friends}" method="get" class="flex gap-2">
                <div class="relative flex-grow">
                  <input type="text" name="q" th:value="${query}" placeholder="Rechercher un nom..." 
                         class="input input-bordered w-full focus:input-primary" />
                </div>
                <button type="submit" class="btn btn-primary">Chercher</button>
              </form>

              <div th:if="${userPage}" class="mt-8">
                <h3 class="font-bold mb-4 opacity-70" th:text="${query != null and !query.isEmpty() ? 'Résultats pour : ' + query : 'Suggestions'}"></h3>
                
                <div class="overflow-x-auto">
                  <table class="table table-zebra">
                    <thead>
                      <tr>
                        <th>ID</th>
                        <th>Photo</th>
                        <th>Nom</th>
                        <th>Statut</th>
                        <th>Action</th>
                      </tr>
                    </thead>
                    <tbody>
                      <tr th:each="user : ${userPage.content}" th:if="${user.id != currentUserId}">
                        <td th:text="${user.id}"></td>
                        <td>
                          <div class="avatar">
                            <div
                              class="w-10 rounded-full overflow-hidden border border-base-300 bg-base-200"
                            >
                              <img
                                th:src="${user.profileImagePath}"
                                alt="Photo de profil utilisateur"
                                class="h-full w-full object-cover"
                              />
                            </div>
                          </div>
                        </td>
                        <td>
                          <span th:replace="~{components/user::nameLink(user=${user})}"></span>
                        </td>
                        <td>
                          <span class="badge badge-success" th:if="${#sets.contains(friendIds, user.id)}"
                            >Ami</span
                          >
                          <span
                            class="badge badge-warning"
                            th:if="${!#sets.contains(friendIds, user.id) and #sets.contains(outgoingRequestTargetIds, user.id)}"
                            >Demande envoyee</span
                          >
                          <span
                            class="badge badge-info"
                            th:if="${!#sets.contains(friendIds, user.id) and #sets.contains(incomingRequestSenderIds, user.id)}"
                            >Demande recue</span
                          >
                          <span
                            class="badge badge-ghost"
                            th:if="${!#sets.contains(friendIds, user.id) and !#sets.contains(outgoingRequestTargetIds, user.id) and !#sets.contains(incomingRequestSenderIds, user.id)}"
                            >Aucun lien</span
                          >
                        </td>
                        <td>
                          <form
                            method="post"
                            th:action="@{/users/friends/unfriend}"
                            th:if="${#sets.contains(friendIds, user.id)}"
                          >
                            <input type="hidden" name="friendId" th:value="${user.id}" />
                            <input type="hidden" name="returnTo" value="/users/friends" />
                            <input
                              type="hidden"
                              th:name="${_csrf.parameterName}"
                              th:value="${_csrf.token}"
                            />
                            <button class="btn btn-warning btn-sm" type="submit">Retirer</button>
                          </form>

                          <div
                            class="flex gap-2"
                            th:if="${!#sets.contains(friendIds, user.id) and #sets.contains(incomingRequestSenderIds, user.id)}"
                          >
                            <form method="post" th:action="@{/users/friends/accept}">
                              <input
                                type="hidden"
                                name="friendshipId"
                                th:value="${incomingRequestIdByUserId[user.id]}"
                              />
                              <input type="hidden" name="returnTo" value="/users/freinds" />
                              <input
                                type="hidden"
                                th:name="${_csrf.parameterName}"
                                th:value="${_csrf.token}"
                              />
                              <button class="btn btn-success btn-sm" type="submit">Accepter</button>
                            </form>
                            <form method="post" th:action="@{/users/friends/refuse}">
                              <input
                                type="hidden"
                                name="friendshipId"
                                th:value="${incomingRequestIdByUserId[user.id]}"
                              />
                              <input type="hidden" name="returnTo" value="/users/friends" />
                              <input
                                type="hidden"
                                th:name="${_csrf.parameterName}"
                                th:value="${_csrf.token}"
                              />
                              <button class="btn btn-error btn-sm" type="submit">Refuser</button>
                            </form>
                          </div>

                          <span
                            class="text-base-content/70 text-sm"
                            th:if="${!#sets.contains(friendIds, user.id) and #sets.contains(outgoingRequestTargetIds, user.id)}"
                            >En attente</span
                          >

                          <form
                            method="post"
                            th:action="@{/users/friends/request}"
                            th:if="${!#sets.contains(friendIds, user.id) and !#sets.contains(outgoingRequestTargetIds, user.id) and !#sets.contains(incomingRequestSenderIds, user.id)}"
                          >
                            <input type="hidden" name="targetUserId" th:value="${user.id}" />
                            <input type="hidden" name="returnTo" value="/users/friends" />
                            <input
                              type="hidden"
                              th:name="${_csrf.parameterName}"
                              th:value="${_csrf.token}"
                            />
                            <button class="btn btn-outline btn-sm" type="submit">Demander en ami</button>
                          </form>
                        </td>
                      </tr>
                    </tbody>
                  </table>
                </div>
                
                <div th:if="${userPage.totalPages > 1}" class="flex justify-center mt-6">
                  <div class="join">
                    <a th:href="@{/users/friends(q=${query}, page=${userPage.number - 1})}" class="join-item btn btn-xs" th:classappend="${!userPage.hasPrevious() ? 'btn-disabled' : ''}">«</a>
                    <button class="join-item btn btn-xs" th:text="${userPage.number + 1}"></button>
                    <a th:href="@{/users/friends(q=${query}, page=${userPage.number + 1})}" class="join-item btn btn-xs" th:classappend="${!userPage.hasNext() ? 'btn-disabled' : ''}">»</a>
                  </div>
                </div>
              </div>
            </div>
          </section>
        </div>
        <div class="lg:w-1/3 space-y-6">
  
            <div class="card border border-base-300 bg-base-100 shadow-sm">
              <div class="card-body p-4 sm:p-6">
                <div class="flex items-center justify-between mb-4">
                  <h2 class="text-md font-bold flex items-center gap-2">
                    <span class="w-2 h-2 rounded-full bg-info"></span>
                    Demandes reçues
                  </h2>
                  <span class="badge badge-ghost badge-sm" th:text="${#lists.size(incomingRequests)}">0</span>
                </div>

                <div class="alert alert-sm bg-base-200 border-none" th:if="${#lists.isEmpty(incomingRequests)}">
                  <span class="text-xs opacity-60">Aucune demande en attente.</span>
                </div>

                <div class="space-y-3">
                  <div th:each="friendship : ${incomingRequests}" class="flex items-center justify-between gap-3 p-3 rounded-xl bg-base-200/50 hover:bg-base-200 transition-colors">
                    <div class="flex items-center gap-3 overflow-hidden">
                      <div class="avatar shrink-0">
                        <div class="w-10 rounded-full border border-base-300">
                          <img th:src="${friendship.requester.profileImagePath}" alt="Photo de profil" />
                        </div>
                      </div>
                      <div class="truncate">
                        <div class="font-semibold text-sm truncate">
                          <span th:replace="~{components/user::nameLink(user=${friendship.requester})}"></span>
                        </div>
                        <span class="text-[10px] uppercase opacity-50 font-bold tracking-tighter">Souhaite vous ajouter</span>
                      </div>
                    </div>
                    <div class="flex gap-1 shrink-0">
                      <form method="post" th:action="@{/users/friends/accept}">
                        <input type="hidden" name="friendshipId" th:value="${friendship.id}" />
                        <input type="hidden" name="returnTo" value="/users/friends" />
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                        <button class="btn btn-success btn-square btn-xs" title="Accepter">✔</button>
                      </form>
                      <form method="post" th:action="@{/users/friends/refuse}">
                        <input type="hidden" name="friendshipId" th:value="${friendship.id}" />
                        <input type="hidden" name="returnTo" value="/users/friends" />
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                        <button class="btn btn-ghost btn-square btn-xs text-error" title="Refuser">✘</button>
                      </form>
                    </div>
                  </div>
                </div>
              </div>
            </div>

            <div class="card border border-base-300 bg-base-100 shadow-sm" th:if="${!#lists.isEmpty(outgoingRequests)}">
              <div class="card-body p-4 sm:p-6">
                <h2 class="text-md font-bold mb-4 opacity-70">Demandes envoyées</h2>
                <div class="flex flex-wrap gap-2">
                  <div th:each="friendship : ${outgoingRequests}" class="tooltip" th:with="target=${friendship.addressee}" th:title="${target.firstname + ' ' + target.lastname}">
                    <div class="avatar">
                      <div class="w-8 rounded-full border-2 border-warning">
                        <img th:src="${target.profileImagePath}" />
                      </div>
                    </div>
                  </div>
                </div>
              </div>
            </div>

            <div class="card border border-base-300 bg-base-100 shadow-sm">
              <div class="card-body p-4 sm:p-6">
                <h2 class="text-md font-bold mb-4 flex items-center gap-2">
                  <span class="w-2 h-2 rounded-full bg-success"></span>
                  Mes amis
                </h2>
                
                <div class="text-center py-4" th:if="${#lists.isEmpty(acceptedFriendships)}">
                  <p class="text-sm opacity-50 italic">Vous n'avez pas encore d'amis.</p>
                </div>

                <div class="max-h-[400px] overflow-y-auto pr-1 space-y-2">
                  <div th:each="friendship : ${acceptedFriendships}" 
                      th:with="friend=${friendship.requester.id == currentUserId ? friendship.addressee : friendship.requester}"
                      class="group flex items-center justify-between p-2 rounded-lg hover:bg-base-200 transition-all">
                    
                    <div class="flex items-center gap-3">
                      <div class="avatar shrink-0">
                        <div class="w-9 rounded-full">
                          <img th:src="${friend.profileImagePath}" />
                        </div>
                      </div>
                      <span class="text-sm font-medium" th:replace="~{components/user::nameLink(user=${friend})}"></span>
                    </div>

                    <form method="post" th:action="@{/users/friends/unfriend}" class="opacity-0 group-hover:opacity-100 transition-opacity">
                      <input type="hidden" name="friendId" th:value="${friend.id}" />
                      <input type="hidden" name="returnTo" value="/users/friends" />
                      <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                      <button class="btn btn-circle btn-ghost btn-xs text-error" onclick="return confirm('Retirer cet ami ?')">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" /></svg>
                      </button>
                    </form>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div> 
      </div> 
    </main>
    <div th:insert="~{components/layout::footer}"></div>
  </body>
</html>
