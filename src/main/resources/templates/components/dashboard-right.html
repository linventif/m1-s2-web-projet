<!doctype html>
<!-- Right rail -->
<aside th:fragment="right-content" class="space-y-5 xl:sticky xl:top-24 self-start">
  <div class="card rounded-[2rem] border border-base-300 bg-base-100 shadow-sm">
    <div class="card-body">
      <div class="flex items-center justify-between gap-3">
        <div>
          <h2 class="card-title text-lg">Objectifs</h2>
          <p class="text-sm text-base-content/60" th:text="${mainGoalLabel}">Objectif : 50 km</p>
        </div>
        <span class="badge rounded-full border-none bg-emerald-100 text-emerald-700"
          >Progression</span
        >
      </div>

      <div class="mt-4 space-y-4 max-h-[340px] overflow-y-auto pr-1 dashboard-scrollbar">
        <div th:if="${#lists.isEmpty(goals)}" class="alert alert-info">
          <span>Aucun objectif configuré.</span>
        </div>

        <div
          th:each="goal : ${goals}"
          class="rounded-2xl border border-base-300 bg-base-200/70 p-4"
        >
          <div class="flex items-start justify-between gap-3">
            <div class="flex min-w-0 items-start gap-3">
              <a
                th:if="${goal.user != null}"
                th:href="@{/users/profile/{id}(id=${goal.user.id})}"
                class="avatar shrink-0"
              >
                <span
                  class="block h-10 w-10 overflow-hidden rounded-full border border-base-300 bg-base-100"
                >
                  <img
                    th:src="${goal.user.profileImagePath}"
                    alt="Photo de profil objectif"
                    class="h-full w-full object-cover"
                  />
                </span>
              </a>
              <div class="min-w-0">
                <p class="truncate font-semibold" th:text="${goal.label}">Courir 50 km</p>
                <p class="text-xs text-base-content/60">
                  <span th:text="${goal.currentValue}">20</span> /
                  <span th:text="${goal.targetValue}">50</span>
                  <span th:text="${goal.unit}">km</span>
                </p>
              </div>
            </div>
            <div
              class="radial-progress shrink-0 text-emerald-600 text-xs font-bold"
              th:style="|--value:${goal.progressPercent}; --size:3rem;|"
              role="progressbar"
              th:text="|${goal.progressPercent}%|"
            >
              40%
            </div>
          </div>
          <progress
            class="progress progress-success mt-3 w-full"
            th:value="${goal.progressPercent}"
            max="100"
          ></progress>
          <div class="mt-2 flex items-center justify-between text-xs text-base-content/60">
            <span th:text="${goal.type.labelFr}">Distance</span>
            <span th:text="${goal.progressPercent >= 100 ? 'Atteint' : 'En cours'}">En cours</span>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="card rounded-[2rem] border border-base-300 bg-base-100 shadow-sm">
    <div class="card-body">
      <div class="flex items-center justify-between">
        <h2 class="card-title text-lg">Challenge</h2>
        <span
          class="badge rounded-full border-none bg-orange-100 text-orange-700"
          th:text="${#lists.size(activeChallenges)}"
          >0</span
        >
      </div>
      <p class="text-sm text-base-content/60">Challenge toi & tes potes.</p>

      <div class="mt-3 space-y-4 max-h-[260px] overflow-y-auto pr-1 dashboard-scrollbar">
        <div th:if="${#lists.isEmpty(activeChallenges)}" class="alert alert-info alert-outline">
          <span>Aucun challenge disponible.</span>
        </div>

        <div
          th:each="challenge : ${activeChallenges}"
          class="rounded-2xl border border-base-300 bg-base-200/70 p-4"
        >
          <div class="flex items-start justify-between gap-3">
            <div class="flex min-w-0 items-start gap-3">
              <a
                th:if="${challenge.creator != null}"
                th:href="@{/users/profile/{id}(id=${challenge.creator.id})}"
                class="avatar shrink-0"
              >
                <span
                  class="block h-10 w-10 overflow-hidden rounded-full border border-base-300 bg-base-100"
                >
                  <img
                    th:src="${challenge.creator.profileImagePath}"
                    alt="Photo de profil challenge"
                    class="h-full w-full object-cover"
                  />
                </span>
              </a>
              <div class="min-w-0">
                <h3 class="truncate font-semibold" th:text="${challenge.title}">
                  Challenge du mois
                </h3>
                <p class="mt-1 text-xs text-base-content/60" th:text="${challenge.description}">
                  Description du challenge
                </p>
              </div>
            </div>
            <span
              class="badge shrink-0 rounded-full"
              th:classappend="${challenge.active ? ' badge-success' : ' badge-ghost'}"
              th:text="${challenge.active ? 'Actif' : 'Terminé'}"
              >Actif</span
            >
          </div>

          <div class="mt-3 flex flex-wrap gap-2 text-xs">
            <span class="badge badge-outline" th:text="${challenge.type.labelFr}">Distance</span>
            <span class="badge badge-outline" th:text="${'Objectif : ' + challenge.targetValue}"
              >Objectif : 100</span
            >
            <span
              class="badge badge-outline"
              th:text="${challenge.startDate + ' → ' + challenge.endDate}"
              >2026-04-01 → 2026-04-30</span
            >
          </div>
        </div>
      </div>
    </div>
  </div>
</aside>
