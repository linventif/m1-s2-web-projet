<!doctype html>
<div th:fragment="comment-section(workout)" th:id="'comment-wrapper-' + ${workout.id}">
  <div class="collapse collapse-arrow bg-base-100 border-t border-base-300 rounded-none">
    <input type="checkbox" class="peer" />

    <div
      class="collapse-title font-semibold after:start-4 after:end-auto ps-12 pe-4 flex items-center justify-between"
    >
      <div class="flex items-center gap-2">
        <svg
          xmlns="http://www.w3.org/2000/svg"
          class="h-4 w-4 text-primary"
          fill="none"
          viewBox="0 0 24 24"
          stroke="currentColor"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2"
            d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z"
          />
        </svg>
        <span class="text-sm">
          Commentaires (<span
            th:text="${workout.comments != null ? #lists.size(workout.comments) : 0}"
            >0</span
          >)
        </span>
      </div>

      <div class="flex items-center gap-1 relative z-20">
        <div
          th:replace="~{components/kudo-toggle :: kudo(workout=${workout}, currentUser=${#authentication.principal})}"
        ></div>
      </div>
    </div>

    <div class="collapse-content">
      <div
        th:id="'comments-container-' + ${workout.id}"
        class="space-y-3 overflow-y-auto pr-2"
        style="max-height: 300px"
      >
        <div
          th:each="comment : ${workout.comments}"
          th:with="canDeleteComment=${#authentication.principal != null and ((comment.author != null and comment.author.id != null and #authentication.principal.id != null and comment.author.id == #authentication.principal.id) or #authorization.expression('hasRole(''ADMIN'')'))}"
          class="flex items-start gap-2 animate-fade-in mb-3"
        >
          <div class="avatar">
            <div class="w-7 rounded-full">
              <img th:src="${comment.author.profileImagePath}" alt="avatar" />
            </div>
          </div>

          <div class="bg-base-200 p-2 rounded-lg flex-1">
            <div class="flex justify-between items-center mb-1">
              <span class="text-xs font-bold"
                ><span th:text="${comment.author.firstname}">Firstname</span>
                <span th:text="${comment.author.lastname}">Lastname</span></span
              >
              <div class="flex items-center gap-1">
                <span
                  class="text-[10px] opacity-50"
                  th:text="${comment.createdAt != null ? #temporals.format(comment.createdAt, 'dd/MM HH:mm') : 'Maintenant'}"
                ></span>
                <button
                  type="button"
                  th:if="${canDeleteComment}"
                  th:onclick="'deleteCommentAjax(' + ${workout.id} + ',' + ${comment.id} + ')'"
                  class="btn btn-ghost btn-xs btn-square text-error"
                  title="Supprimer le commentaire"
                  aria-label="Supprimer le commentaire"
                >
                  <i class="fa-solid fa-trash-can"></i>
                </button>
              </div>
            </div>
            <p class="text-xs text-base-content/80" th:text="${comment.content}"></p>
          </div>
        </div>

        <div
          th:if="${#lists.isEmpty(workout.comments)}"
          class="text-center py-4 text-xs opacity-50"
        >
          Aucun commentaire pour le moment.
        </div>
      </div>

      <div class="mt-4 flex gap-2 pt-2 border-t border-base-200" onclick="event.stopPropagation()">
        <input
          type="text"
          th:id="'comment-input-' + ${workout.id}"
          class="input input-bordered input-sm flex-1 focus:outline-none"
          placeholder="Écrire un commentaire..."
        />

        <button
          th:onclick="'postCommentAjax(' + ${workout.id} + ')'"
          class="btn btn-primary btn-sm"
        >
          Envoyer
        </button>
      </div>
    </div>
  </div>
</div>
