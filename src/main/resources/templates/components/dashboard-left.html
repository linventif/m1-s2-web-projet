<!doctype html>
<html
  lang="fr"
  data-theme="emerald"
  xmlns:th="http://www.thymeleaf.org"
  xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
>
  <!-- Left rail -->
  <aside th:fragment="left-content" class="space-y-5 xl:sticky xl:top-24 self-start">
    <div class="card rounded-[2rem] border border-base-300 bg-base-100 shadow-sm">
      <div class="card-body">
        <div class="flex items-center gap-4">
          <div class="avatar">
            <div class="w-16 rounded-full overflow-hidden border border-base-300 bg-base-200">
              <img
                th:src="${#authentication.principal.profileImagePath}"
                alt="Photo de profil"
                class="h-full w-full object-cover"
              />
            </div>
          </div>
          <div class="min-w-0">
            <h2 class="truncate text-lg font-black">
              <a th:href="@{/users/profile}" class="link link-hover">
                <span sec:authentication="principal.firstname">Prénom</span>
                <span sec:authentication="principal.lastname">Nom</span>
              </a>
            </h2>
            <p class="truncate text-sm text-base-content/60" sec:authentication="name">
              user@email.com
            </p>
          </div>
        </div>

        <div class="mt-4 grid grid-cols-3 gap-3 text-center">
          <div class="rounded-2xl bg-base-200 p-3">
            <p class="text-lg font-black text-orange-500" th:text="${#lists.size(workouts)}">0</p>
            <p class="text-xs text-base-content/60">Sorties</p>
          </div>
          <div class="rounded-2xl bg-base-200 p-3">
            <p class="text-lg font-black text-emerald-600" th:text="${#lists.size(goals)}">0</p>
            <p class="text-xs text-base-content/60">Objectifs</p>
          </div>
          <div class="rounded-2xl bg-base-200 p-3">
            <p class="text-lg font-black text-sky-600" th:text="${#lists.size(friends)}">0</p>
            <p class="text-xs text-base-content/60">Amis</p>
          </div>
        </div>
      </div>
    </div>

    <!-- Cette semaine -->
    <div class="card rounded-[2rem] border border-base-300 bg-base-100 shadow-sm">
      <div class="card-body">
        <div class="flex items-center justify-between">
          <h2 class="card-title text-lg uppercase">Cette semaine</h2>
          <a
            th:href="@{/users/statistique}"
            class="btn btn-warning btn-outline btn-sm rounded-full"
          >
            Statistique
          </a>
        </div>

        <div class="mt-2 text-center">
          <span class="text-5xl font-light" th:text="${totalDistanceThisWeek}">0</span>
          <span class="text-2xl font-light text-base-content/70">km</span>
        </div>

        <div class="mt-5 flex h-14 items-end justify-center gap-2">
          <div
            class="h-1 w-4 rounded-sm"
            th:classappend="${todayIndex == 0} ? ' bg-orange-500' : ' bg-base-300'"
          ></div>
          <div
            class="h-1 w-4 rounded-sm"
            th:classappend="${todayIndex == 1} ? ' bg-orange-500' : ' bg-base-300'"
          ></div>
          <div
            class="h-1 w-4 rounded-sm"
            th:classappend="${todayIndex == 2} ? ' bg-orange-500' : ' bg-base-300'"
          ></div>
          <div
            class="h-1 w-4 rounded-sm"
            th:classappend="${todayIndex == 3} ? ' bg-orange-500' : ' bg-base-300'"
          ></div>
          <div
            class="h-1 w-4 rounded-sm"
            th:classappend="${todayIndex == 4} ? ' bg-orange-500' : ' bg-base-300'"
          ></div>
          <div
            class="h-1 w-4 rounded-sm"
            th:classappend="${todayIndex == 5} ? ' bg-orange-500' : ' bg-base-300'"
          ></div>
          <div
            class="h-1 w-4 rounded-sm"
            th:classappend="${todayIndex == 6} ? ' bg-orange-500' : ' bg-base-300'"
          ></div>
        </div>

        <div class="mt-2 flex items-center justify-center gap-2 text-sm font-semibold">
            <span
              class="w-4 text-center"
              th:classappend="${todayIndex == 0} ? ' text-orange-500' : ''"
            >L</span
          >
          <span
            class="w-4 text-center"
            th:classappend="${todayIndex == 1} ? ' text-orange-500' : ''"
            >M</span
          >
            <span
              class="w-4 text-center"
              th:classappend="${todayIndex == 2} ? ' text-orange-500' : ''"
              >M</span
            >
          <span
            class="w-4 text-center"
            th:classappend="${todayIndex == 3} ? ' text-orange-500' : ''"
            >J</span
          >
            <span
              class="w-4 text-center"
              th:classappend="${todayIndex == 4} ? ' text-orange-500' : ''"
              >V</span
            >
          <span
            class="w-4 text-center"
            th:classappend="${todayIndex == 5} ? ' text-orange-500' : ''"
            >S</span
          >
          <span
            class="w-4 text-center"
            th:classappend="${todayIndex == 6} ? ' text-orange-500' : ''"
            >D</span
          >
        </div>

        <div class="mt-5 grid grid-cols-2 items-center border-t border-base-300 pt-4 text-center">
          <div class="border-r border-base-300">
            <div class="text-2xl font-light">
              <span th:text="${hoursPart}">0</span>h <span th:text="${minutesPart}">0</span>m
            </div>
            <p class="text-xs text-base-content/60">Temps</p>
          </div>

          <div>
            <div class="text-2xl font-light">
              <span th:text="${totalCaloriesThisWeek}">0</span> kcal
            </div>
            <p class="text-xs text-base-content/60">Calories</p>
          </div>
        </div>
      </div>
    </div>

    <div class="card rounded-[2rem] border border-base-300 bg-base-100 shadow-sm">
      <div class="card-body">
        <div class="flex items-center justify-between">
          <h2 class="card-title text-lg">Suggestions d'amis</h2>
          <span class="badge badge-neutral rounded-full" th:text="${#lists.size(friends)}">0</span>
        </div>
        <p class="text-sm text-base-content/60">Ton groupe sportif du moment.</p>

        <div class="mt-3 space-y-3 max-h-[340px] overflow-y-auto pr-1 dashboard-scrollbar">
          <div th:if="${#lists.isEmpty(friends)}" class="alert">
            <span>Aucun ami accepté pour le moment.</span>
          </div>

          <div
            th:each="friendship : ${friends}"
            th:with="friend=${friendship.requester.email == #authentication.name ? friendship.addressee : friendship.requester}"
            class="flex items-center gap-3 rounded-2xl border border-base-300 bg-base-200/70 p-3"
          >
            <div class="avatar">
              <div class="w-12 rounded-full overflow-hidden border border-base-300 bg-base-200">
                <img
                  th:src="${friend.profileImagePath}"
                  alt="Photo de profil ami"
                  class="h-full w-full object-cover"
                />
              </div>
            </div>
            <div class="min-w-0 flex-1">
              <p class="truncate">
                <span th:replace="~{components/user::nameLink(user=${friend})}"></span>
              </p>
              <p class="truncate text-xs text-base-content/60" th:text="${friend.email}">
                ami@email.com
              </p>
              <p class="mt-1 text-xs text-base-content/50">
                Niveau : <span th:text="${friend.level.labelFr}">Débutant</span>
              </p>
            </div>
          </div>
        </div>
      </div>
    </div>
  </aside>
</html>
