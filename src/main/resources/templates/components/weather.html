<!doctype html>
<div
  th:fragment="weather(data)"
  class="inline-flex items-center gap-2 p-1.5 px-3 bg-base-200/40 rounded-xl border border-base-300 shadow-sm w-fit"
>
  <div class="flex items-center gap-2 shrink-0">
    <img
      th:if="${data.weatherIndicator != null}"
      th:src="@{/images/weather/{name}.png(name=${data.weatherIndicator})}"
      alt="Météo"
      class="w-8 h-8 object-contain"
    />

    <div class="flex flex-col">
      <span class="text-lg font-bold leading-none" th:text="${data.averageTemperature + '°C'}"
        >21°C</span
      >
    </div>

    <div class="dropdown dropdown-end">
      <button
        type="button"
        tabindex="0"
        onkeydown="
          if (event.key === 'Enter' || event.key === ' ') {
            this.click();
          }
        "
        class="btn btn-circle btn-ghost h-6 w-6 min-h-0 text-info/60 hover:bg-info/10"
      >
        <svg
          xmlns="http://www.w3.org/2000/svg"
          fill="none"
          viewBox="0 0 24 24"
          class="h-3.5 w-3.5 stroke-current"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2"
            d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"
          ></path>
        </svg>
      </button>

      <div
        class="card card-sm dropdown-content bg-base-100 border border-base-300 rounded-lg z-[50] w-56 shadow-xl mt-1"
      >
        <div class="card-body p-3">
          <h3
            class="card-title text-[11px] uppercase tracking-wider mb-1 border-b border-base-200 pb-1 opacity-70"
          >
            Détails météo
          </h3>

          <div class="grid grid-cols-3 gap-1 text-center">
            <div class="flex flex-col">
              <span class="text-[7px] uppercase opacity-50 font-bold text-error">Min</span>
              <span class="text-xs font-bold" th:text="${data.minTemperature + '°'}">15°</span>
            </div>
            <div class="flex flex-col border-x border-base-200">
              <span class="text-[7px] uppercase opacity-50 font-bold">Moy.</span>
              <span class="text-xs font-bold" th:text="${data.averageTemperature + '°C'}"
                >20°C</span
              >
            </div>
            <div class="flex flex-col">
              <span class="text-[7px] uppercase opacity-50 font-bold text-success">Max</span>
              <span class="text-xs font-bold" th:text="${data.maxTemperature + '°'}">24°</span>
            </div>
          </div>

          <div class="divider my-0.5"></div>

          <div class="space-y-0.5 text-[10px]">
            <div class="flex justify-between">
              <span class="opacity-60">Ressenti</span>
              <span class="font-bold" th:text="${data.averageApparentTemperature + '°C'}"
                >18°C</span
              >
            </div>
            <div class="flex justify-between">
              <span class="opacity-60">Précipitations</span>
              <span class="font-bold" th:text="${data.averagePrecipitation + '%'}">12%</span>
            </div>
            <div class="flex justify-between">
              <span class="opacity-60">Vent</span>
              <span class="font-bold" th:text="${data.averageWindSpeed + ' km/h'}">10 km/h</span>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
