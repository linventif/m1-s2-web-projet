<!DOCTYPE html>
<div th:fragment="weather(data)" 
     class="inline-flex items-center gap-4 p-3 bg-base-200/40 rounded-2xl border border-base-300 shadow-sm w-fit">
  
  <div class="flex items-center gap-3 border-r border-base-300 pr-4 shrink-0">
    <img th:src="@{/images/weather/{name}.png(name=${data.weatherIndicator})}" 
         alt="Météo" class="w-10 h-10 object-contain" />
    <div class="flex flex-col">
      <span class="text-xl font-bold leading-none" th:text="${data.averageTemperature + '°C'}">21°C</span>
    </div>
  </div>

  <div class="flex items-center gap-3">
    <div class="grid grid-cols-2 gap-x-4">
      <div class="flex flex-col justify-center">
        <span class="text-[9px] uppercase font-bold opacity-40 leading-none mb-1">Vent</span>
        <span class="text-xs font-semibold whitespace-nowrap" th:text="${data.averageWindSpeed + ' km/h'}">14 km/h</span>
      </div>
      <div class="flex flex-col justify-center">
        <span class="text-[9px] uppercase font-bold opacity-40 leading-none mb-1">Pluie</span>
        <span class="text-xs font-semibold whitespace-nowrap" th:text="${data.averagePrecipitation + '%'}">5%</span>
      </div>
    </div>

    <div class="dropdown dropdown-end">
      <button type="button" tabindex="0" onkeydown="if(event.key==='Enter'||event.key===' '){this.click();}" class="btn btn-circle btn-ghost btn-xs text-info/60 hover:bg-info/10">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" class="h-4 w-4 stroke-current">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
        </svg>
      </button>

      <div class="card card-sm dropdown-content bg-base-100 border border-base-300 rounded-box z-[50] w-64 shadow-xl mt-2">
        <div class="card-body p-4">
          <h3 class="card-title text-sm mb-2 border-b border-base-200 pb-1">Détails météo</h3>
          
          <div class="grid grid-cols-3 gap-2 text-center">
            <div class="flex flex-col">
              <span class="text-[8px] uppercase opacity-50 font-bold text-error">Min</span>
              <span class="text-xs font-bold" th:text="${data.minTemperature + '°'}">15°</span>
            </div>
            <div class="flex flex-col border-x border-base-300">
              <span class="text-[8px] uppercase opacity-50 font-bold">Moy.</span>
              <span class="text-xs font-bold" th:text="${data.averageTemperature + '°C'}">20°C</span>
            </div>
            <div class="flex flex-col">
              <span class="text-[8px] uppercase opacity-50 font-bold text-success">Max</span>
              <span class="text-xs font-bold" th:text="${data.maxTemperature + '°'}">24°</span>
            </div>
          </div>

          <div class="divider my-1"></div>

          <div class="space-y-1 text-[11px]">
            <div class="flex justify-between font-medium">
              <span class="opacity-60">Ressenti moyen</span>
              <span th:text="${data.averageApparentTemperature + '°C'}">18°C</span>
            </div>
            <div class="flex justify-between font-medium">
              <span class="opacity-60">Précip. moy.</span>
              <span th:text="${data.averagePrecipitation + '%'}">12%</span>
            </div>
            <div class="flex justify-between font-medium">
              <span class="opacity-60">Vent moyen</span>
              <span th:text="${data.averageWindSpeed + ' km/h'}">10 km/h</span>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
