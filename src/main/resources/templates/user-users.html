<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head th:replace="~{components/layout::head(title='Liste des utilisateurs')}">
  <title>Liste des utilisateurs</title>
</head>

<body class="min-h-screen bg-base-200 text-base-content">
  <div th:insert="~{components/layout::header}"></div>
  <main class="mx-auto flex min-h-screen w-full max-w-6xl flex-col px-4 pb-6 pt-24 sm:px-6 lg:px-8">
    <section class="card border border-base-300 bg-base-100 shadow-xl">
      <div class="card-body gap-6 p-6 sm:p-8">
        <div class="alert alert-success" th:if="${message}">
          <span th:text="${message}">Action completed.</span>
        </div>

        <div class="alert alert-error" th:if="${errorMessage}">
          <span th:text="${errorMessage}">Action failed.</span>
        </div>

        <div class="alert alert-info" th:if="${#lists.isEmpty(users)}">
          <span>Aucun utilisateur a afficher.</span>
        </div>

        <div class="overflow-x-auto rounded-box border border-base-300" th:if="${!#lists.isEmpty(users)}">
          <table class="table table-zebra">
            <thead>
              <tr>
                <th>ID</th>
                <th>Photo</th>
                <th>Nom</th>
                <th>Statut</th>
                <th>Action</th>
              </tr>
            </thead>
            <tbody>
              <tr th:each="user : ${users}">
                <td th:text="${user.id}"></td>
                <td>
                  <div class="avatar">
                    <div class="w-10 rounded-full overflow-hidden border border-base-300 bg-base-200">
                      <img th:src="${user.profileImagePath}" alt="Photo de profil utilisateur" class="h-full w-full object-cover" />
                    </div>
                  </div>
                </td>
                <td class="font-semibold" th:text="${user.firstname + ' ' + user.lastname}"></td>
                <td>
                  <span class="badge badge-success" th:if="${#sets.contains(friendIds, user.id)}">Ami</span>
                  <span class="badge badge-warning"
                    th:if="${!#sets.contains(friendIds, user.id) and #sets.contains(outgoingRequestTargetIds, user.id)}">Demande
                    envoyee</span>
                  <span class="badge badge-info"
                    th:if="${!#sets.contains(friendIds, user.id) and #sets.contains(incomingRequestSenderIds, user.id)}">Demande
                    recue</span>
                  <span class="badge badge-ghost"
                    th:if="${!#sets.contains(friendIds, user.id) and !#sets.contains(outgoingRequestTargetIds, user.id) and !#sets.contains(incomingRequestSenderIds, user.id)}">Aucun
                    lien</span>
                </td>
                <td>
                  <form method="post" th:action="@{/users/friends/unfriend}"
                    th:if="${#sets.contains(friendIds, user.id)}">
                    <input type="hidden" name="friendId" th:value="${user.id}">
                    <input type="hidden" name="returnTo" value="/users/users">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                    <button class="btn btn-warning btn-sm" type="submit">Retirer</button>
                  </form>

                  <div class="flex gap-2"
                    th:if="${!#sets.contains(friendIds, user.id) and #sets.contains(incomingRequestSenderIds, user.id)}">
                    <form method="post" th:action="@{/users/friends/accept}">
                      <input type="hidden" name="friendshipId" th:value="${incomingRequestIdByUserId[user.id]}">
                      <input type="hidden" name="returnTo" value="/users/users">
                      <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                      <button class="btn btn-success btn-sm" type="submit">Accepter</button>
                    </form>
                    <form method="post" th:action="@{/users/friends/refuse}">
                      <input type="hidden" name="friendshipId" th:value="${incomingRequestIdByUserId[user.id]}">
                      <input type="hidden" name="returnTo" value="/users/users">
                      <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                      <button class="btn btn-error btn-sm" type="submit">Refuser</button>
                    </form>
                  </div>

                  <span class="text-base-content/70 text-sm"
                    th:if="${!#sets.contains(friendIds, user.id) and #sets.contains(outgoingRequestTargetIds, user.id)}">En
                    attente</span>

                  <form method="post" th:action="@{/users/friends/request}"
                    th:if="${!#sets.contains(friendIds, user.id) and !#sets.contains(outgoingRequestTargetIds, user.id) and !#sets.contains(incomingRequestSenderIds, user.id)}">
                    <input type="hidden" name="targetUserId" th:value="${user.id}">
                    <input type="hidden" name="returnTo" value="/users/users">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                    <button class="btn btn-outline btn-sm" type="submit">Demander en ami</button>
                  </form>
                </td>
              </tr>
            </tbody>
          </table>
        </div>

        <div class="flex gap-10 ">
          <div class="flex gap-2">
            <a class="btn btn-outline group-item" th:href="@{/users/profile}">Profil</a>
            <a class="btn btn-outline group-item" th:href="@{/users/friends}">Amis</a>
            <a class="btn btn-outline group-item" th:href="@{/users/users}">Utilisateurs</a>
            <a class="btn btn-outline group-item" th:href="@{/users/workout}">Activites</a>
          </div>
          <div class="flex gap-2">
            <a class="btn btn-outline" th:href="@{/users/create}">Creer un compte</a>
          </div>
        </div>
      </div>
    </section>
  </main>
</body>

</html>
