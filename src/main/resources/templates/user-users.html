<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Liste des Utilisateurs</title>
  <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css">
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="min-h-screen bg-base-200 text-base-content">
  <main class="mx-auto flex min-h-screen w-full max-w-6xl flex-col px-4 py-6 sm:px-6 lg:px-8">
    <section class="card border border-base-300 bg-base-100 shadow-xl">
      <div class="card-body gap-6 p-6 sm:p-8">
        <div class="alert alert-info" th:if="${#lists.isEmpty(users)}">
          <span>Aucun utilisateur a afficher.</span>
        </div>

        <div class="overflow-x-auto rounded-box border border-base-300" th:if="${!#lists.isEmpty(users)}">
          <table class="table table-zebra">
            <thead>
              <tr>
                <th>ID</th>
                <th>Nom</th>
                <!-- <th>Email</th> -->
                <th>Ami</th>
              </tr>
            </thead>
            <tbody>
              <tr th:each="user : ${users}">
                <td th:text="${user.id}"></td>
                <td class="font-semibold" th:text="${user.name}"></td>
                <td>

                  <button class="btn btn-outside">
                      Demander en Ami
                  </button>
                </td>
                <!-- <td>
                    <a class="link link-primary" th:href="|mailto:${user.email}|" th:text="${user.email}"></a>
                </td> -->
                <!-- <td>
                    <span class="badge badge-secondary badge-outline" th:text="${user.statut.nomStatut}">Statut</span>
                </td>
                <td>
                    <span class="text-base-content/70" th:if="${#sets.isEmpty(user.organizedConferences)}">Aucune conference organisee</span>
                    <ul class="flex flex-wrap gap-2" th:if="${!#sets.isEmpty(user.organizedConferences)}">
                        <li th:each="conference : ${user.organizedConferences}">
                            <span class="badge badge-outline badge-primary" th:text="|${conference.titleconf} (ID ${conference.idconf})|"></span>
                        </li>
                    </ul>
                </td> -->
              </tr>
            </tbody>
          </table>
        </div>

        <div class="flex gap-10 ">
          <div class="flex gap-2">
          <a class="btn btn-outline group-item" th:href="@{/users/profile}">Profil</a>
          <a class="btn btn-outline group-item" th:href="@{/users/friends}">Amis</a>
          <a class="btn btn-outline group-item" th:href="@{/users/users}">Utilisateurs</a>
          <a class="btn btn-outline group-item" th:href="@{/users/workout}">Activités</a>
          </div>
          <div class="flex gap-2">
              <a class="btn btn-outline" th:href="@{/users/login}">Se Connecter</a>
              <a class="btn btn-outline" th:href="@{/users/create}">Créer un Compte</a>
          </div>
        </div>
      </div>
    </section>
  </main>
</body>
</html>
