<!doctype html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
  <head th:replace="~{components/layout::head(title='Mes objectifs')}">
    <title>Mes objectifs</title>
  </head>

  <body class="min-h-screen bg-base-200 text-base-content">
    <div th:insert="~{components/layout::header}"></div>
    <main
      class="mx-auto flex min-h-screen w-full max-w-6xl flex-col px-4 pb-6 pt-24 sm:px-6 lg:px-8"
    >
      <section class="card border border-base-300 bg-base-100 shadow-xl">
        <div class="card-body gap-6 p-6 sm:p-8">
          <div class="space-y-2">
            <h2 class="text-2xl font-bold text-slate-950">Mes objectifs</h2>
            <p class="text-sm text-base-content/70" th:if="${user != null}">
              <span th:text="${user.firstname}">Prenom</span>
              <span th:text="${user.lastname}">Nom</span>
            </p>
          </div>

          <div class="alert alert-info alert-outline" th:if="${#lists.isEmpty(goals)}">
            <span>Aucun objectif pour le moment.</span>
          </div>

          <div class="space-y-4" th:if="${!#lists.isEmpty(goals)}">
            <article
              class="rounded-2xl border border-base-300 bg-base-200 p-4"
              th:each="goal : ${goals}"
            >
              <div class="flex flex-wrap items-center justify-between gap-2">
                <h3 class="font-semibold" th:text="${goal.label}">Objectif</h3>
                <span class="badge badge-outline" th:text="${goal.type.labelFr}">Type</span>
              </div>

              <p class="mt-2 text-sm text-base-content/80">
                <span th:text="${goal.currentValue}">0</span>
                /
                <span th:text="${goal.targetValue}">0</span>
                <span th:text="${goal.unit}">km</span>
              </p>

              <progress
                class="progress progress-primary mt-3 w-full"
                max="100"
                th:value="${goal.progressPercent}"
              ></progress>
              <p class="mt-1 text-xs text-base-content/70">
                Progression :
                <span th:text="${goal.progressPercent}">0</span>
                %
              </p>
            </article>
          </div>
        </div>
      </section>
    </main>
    <div th:insert="~{components/layout::footer}"></div>
  </body>
</html>
