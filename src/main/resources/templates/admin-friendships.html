<!doctype html>
<html
  lang="fr"
  data-theme="emerald"
  xmlns:th="http://www.thymeleaf.org"
  xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
>
  <head th:replace="~{components/layout::head(title='Administration - Amitiés')}">
    <title>Administration - Amitiés</title>
  </head>

  <body class="strava-shell min-h-screen text-base-content">
    <div class="drawer">
      <input id="mobile-nav" type="checkbox" class="drawer-toggle" />

      <div class="drawer-content min-h-screen">
        <div th:insert="~{components/layout::header}"></div>

        <main class="px-3 pb-8 pt-24 md:px-5">
          <div class="mx-auto max-w-[1600px] space-y-6">
            <section class="card rounded-[2rem] border border-base-300 bg-base-100 shadow-sm">
              <div class="card-body space-y-4">
                <h1 class="text-3xl font-black">Administration - Amitiés</h1>
                <div class="grid gap-2 sm:grid-cols-2 lg:grid-cols-4 xl:grid-cols-7">
                  <a th:href="@{/admin/users}" class="btn btn-outline btn-sm rounded-full"
                    >Utilisateurs</a
                  >
                  <a th:href="@{/admin/sports}" class="btn btn-outline btn-sm rounded-full"
                    >Sports</a
                  >
                  <a th:href="@{/admin/workouts}" class="btn btn-outline btn-sm rounded-full"
                    >Activités</a
                  >
                  <a th:href="@{/admin/badges}" class="btn btn-outline btn-sm rounded-full"
                    >Badges</a
                  >
                  <a th:href="@{/admin/goals}" class="btn btn-outline btn-sm rounded-full"
                    >Objectifs</a
                  >
                  <a th:href="@{/admin/challenges}" class="btn btn-outline btn-sm rounded-full"
                    >Défis</a
                  >
                  <a
                    th:href="@{/admin/friendships}"
                    class="btn btn-outline btn-sm rounded-full btn-primary text-primary-content border-primary"
                    >Amitiés</a
                  >
                </div>

                <div th:if="${message}" class="alert alert-success">
                  <span th:text="${message}"></span>
                </div>
                <div th:if="${errorMessage}" class="alert alert-error">
                  <span th:text="${errorMessage}"></span>
                </div>
              </div>
            </section>

            <section class="card rounded-[2rem] border border-base-300 bg-base-100 shadow-sm">
              <div class="card-body space-y-4">
                <h2 class="card-title text-2xl">Amitiés</h2>

                <form
                  th:action="@{/admin/friendships/create}"
                  method="post"
                  class="rounded-2xl bg-base-200 p-4"
                >
                  <h3 class="mb-3 text-lg font-bold">Créer / synchroniser une relation</h3>
                  <div class="grid gap-3 md:grid-cols-3">
                    <select name="requesterId" class="select select-bordered" required>
                      <option value="" disabled selected>Demandeur</option>
                      <option
                        th:each="user : ${users}"
                        th:if="${user != null}"
                        th:value="${user.id}"
                        th:text="${user.firstname + ' ' + user.lastname + ' (#' + user.id + ')'}"
                      ></option>
                    </select>
                    <select name="addresseeId" class="select select-bordered" required>
                      <option value="" disabled selected>Destinataire</option>
                      <option
                        th:each="user : ${users}"
                        th:if="${user != null}"
                        th:value="${user.id}"
                        th:text="${user.firstname + ' ' + user.lastname + ' (#' + user.id + ')'}"
                      ></option>
                    </select>
                    <select name="status" class="select select-bordered" required>
                      <option
                        th:each="friendshipStatus : ${friendshipStatuses}"
                        th:value="${friendshipStatus}"
                        th:text="${friendshipStatus.labelFr}"
                      ></option>
                    </select>
                  </div>
                  <button type="submit" class="btn btn-primary mt-4">Enregistrer</button>
                </form>

                <div class="space-y-3" th:if="${#lists.isEmpty(friendships)}">
                  <div class="alert"><span>Aucune relation.</span></div>
                </div>
                <div class="space-y-3" th:unless="${#lists.isEmpty(friendships)}">
                  <details
                    th:each="friendship : ${friendships}"
                    th:if="${friendship != null}"
                    class="collapse collapse-arrow border border-base-300 bg-base-100"
                  >
                    <summary class="collapse-title font-semibold">
                      #<span th:text="${friendship.id}">1</span> -
                      <span
                        th:text="${friendship.requester != null ? friendship.requester.firstname + ' ' + friendship.requester.lastname : 'Demandeur inconnu'}"
                        >Demandeur</span
                      >
                      ->
                      <span
                        th:text="${friendship.addressee != null ? friendship.addressee.firstname + ' ' + friendship.addressee.lastname : 'Destinataire inconnu'}"
                        >Destinataire</span
                      >
                      (<span th:text="${friendship.status.labelFr}">En attente</span>)
                    </summary>
                    <div class="collapse-content space-y-3">
                      <p class="text-sm text-base-content/60">
                        Créée le
                        <span
                          th:text="${friendship.createdAt != null ? #temporals.format(friendship.createdAt, 'yyyy-MM-dd HH:mm') : '-'}"
                          >date</span
                        >
                        | Mise à jour le
                        <span
                          th:text="${friendship.updatedAt != null ? #temporals.format(friendship.updatedAt, 'yyyy-MM-dd HH:mm') : '-'}"
                          >date</span
                        >
                      </p>

                      <form
                        th:action="@{/admin/friendships/{id}/update(id=${friendship.id})}"
                        method="post"
                        class="grid gap-3 md:grid-cols-3"
                      >
                        <select name="requesterId" class="select select-bordered" required>
                          <option
                            th:each="user : ${users}"
                            th:if="${user != null}"
                            th:value="${user.id}"
                            th:text="${user.firstname + ' ' + user.lastname + ' (#' + user.id + ')'}"
                            th:selected="${friendship.requester != null and user != null and user.id != null and friendship.requester.id == user.id}"
                          ></option>
                        </select>
                        <select name="addresseeId" class="select select-bordered" required>
                          <option
                            th:each="user : ${users}"
                            th:if="${user != null}"
                            th:value="${user.id}"
                            th:text="${user.firstname + ' ' + user.lastname + ' (#' + user.id + ')'}"
                            th:selected="${friendship.addressee != null and user != null and user.id != null and friendship.addressee.id == user.id}"
                          ></option>
                        </select>
                        <select name="status" class="select select-bordered" required>
                          <option
                            th:each="friendshipStatus : ${friendshipStatuses}"
                            th:value="${friendshipStatus}"
                            th:text="${friendshipStatus.labelFr}"
                            th:selected="${friendshipStatus == friendship.status}"
                          ></option>
                        </select>
                        <button type="submit" class="btn btn-primary">Mettre à jour</button>
                      </form>

                      <form
                        th:action="@{/admin/friendships/{id}/delete(id=${friendship.id})}"
                        method="post"
                      >
                        <button type="submit" class="btn btn-error btn-outline">Supprimer</button>
                      </form>
                    </div>
                  </details>
                </div>
              </div>
            </section>
          </div>
        </main>

        <div th:replace="~{components/layout::footer}"></div>
      </div>
    </div>
  </body>
</html>
