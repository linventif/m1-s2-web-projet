<!doctype html>
<html
  lang="fr"
  xmlns:th="http://www.thymeleaf.org"
  xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
>
  <head th:replace="~{components/layout::head(title='Erreur')}">
    <title>Erreur</title>
  </head>
  <body class="bg-base-200 min-h-screen flex items-center justify-center font-sans">
    <div class="hero">
      <div class="hero-content text-center">
        <div class="max-w-md bg-base-100 p-10 rounded-2xl shadow-xl">
          <div class="text-error mb-4 flex justify-center">
            <svg
              xmlns="http://www.w3.org/2000/svg"
              class="h-24 w-24"
              fill="none"
              viewBox="0 0 24 24"
              stroke="currentColor"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 15c-.77 1.333.192 3 1.732 3z"
              />
            </svg>
          </div>

          <h1
            class="text-5xl font-bold text-base-content mb-2"
            th:text="${httpStatus != null ? httpStatus : (status != null ? status : 'Erreur')}"
          >
            500
          </h1>

          <h2
            class="text-xl font-semibold text-secondary mb-4"
            th:text="${reason != null ? reason : (error != null ? error : 'Une erreur est survenue')}"
          >
            Erreur interne du serveur
          </h2>

          <div class="divider"></div>

          <p
            class="mb-8 text-base-content/70 italic break-words"
            th:text="${message != null ? message : 'Une erreur inattendue est survenue. Veuillez réessayer plus tard.'}"
          >
            Les détails de l'erreur s'affichent ici.
          </p>

          <a th:href="@{/}" class="btn btn-primary px-8">Retour à l'accueil</a>
        </div>
      </div>
    </div>
  </body>
</html>
