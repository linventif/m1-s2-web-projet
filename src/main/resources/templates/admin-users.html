<!doctype html>
<html
  lang="fr"
  data-theme="emerald"
  xmlns:th="http://www.thymeleaf.org"
  xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
>
  <head th:replace="~{components/layout::head(title='Administration - Utilisateurs')}">
    <title>Administration - Utilisateurs</title>
  </head>

  <body class="strava-shell min-h-screen text-base-content">
    <div class="drawer">
      <input id="mobile-nav" type="checkbox" class="drawer-toggle" />

      <div class="drawer-content min-h-screen">
        <div th:insert="~{components/layout::header}"></div>

        <main class="px-3 pb-8 pt-24 md:px-5">
          <div class="mx-auto max-w-[1600px] space-y-6">
            <section class="card rounded-[2rem] border border-base-300 bg-base-100 shadow-sm">
              <div class="card-body space-y-4">
                <h1 class="text-3xl font-black">Administration - Utilisateurs</h1>
                <div class="grid gap-2 sm:grid-cols-2 lg:grid-cols-4 xl:grid-cols-7">
                  <a
                    th:href="@{/admin/users}"
                    class="btn btn-outline btn-sm rounded-full btn-primary text-primary-content border-primary"
                    >Utilisateurs</a
                  >
                  <a th:href="@{/admin/sports}" class="btn btn-outline btn-sm rounded-full"
                    >Sports</a
                  >
                  <a th:href="@{/admin/workouts}" class="btn btn-outline btn-sm rounded-full"
                    >Activités</a
                  >
                  <a th:href="@{/admin/badges}" class="btn btn-outline btn-sm rounded-full"
                    >Badges</a
                  >
                  <a th:href="@{/admin/goals}" class="btn btn-outline btn-sm rounded-full"
                    >Objectifs</a
                  >
                  <a th:href="@{/admin/challenges}" class="btn btn-outline btn-sm rounded-full"
                    >Défis</a
                  >
                  <a th:href="@{/admin/friendships}" class="btn btn-outline btn-sm rounded-full"
                    >Amitiés</a
                  >
                </div>

                <div th:if="${message}" class="alert alert-success">
                  <span th:text="${message}"></span>
                </div>
                <div th:if="${errorMessage}" class="alert alert-error">
                  <span th:text="${errorMessage}"></span>
                </div>
              </div>
            </section>

            <section class="card rounded-[2rem] border border-base-300 bg-base-100 shadow-sm">
              <div class="card-body space-y-4">
                <h2 class="card-title text-2xl">Utilisateurs</h2>

                <form
                  th:action="@{/admin/users/create}"
                  method="post"
                  class="rounded-2xl bg-base-200 p-4"
                >
                  <h3 class="mb-3 text-lg font-bold">Créer un utilisateur</h3>
                  <div class="grid gap-3 md:grid-cols-2 xl:grid-cols-4">
                    <input
                      name="firstname"
                      class="input input-bordered"
                      placeholder="Prénom"
                      maxlength="80"
                      autocomplete="given-name"
                      required
                    />
                    <input
                      name="lastname"
                      class="input input-bordered"
                      placeholder="Nom"
                      maxlength="80"
                      autocomplete="family-name"
                      required
                    />
                    <input
                      name="email"
                      type="email"
                      class="input input-bordered"
                      placeholder="Email"
                      maxlength="254"
                      autocomplete="email"
                      required
                    />
                    <input
                      name="password"
                      type="password"
                      class="input input-bordered"
                      placeholder="Mot de passe"
                      minlength="6"
                      maxlength="72"
                      autocomplete="new-password"
                      required
                    />
                    <select name="role" class="select select-bordered" required>
                      <option
                        th:each="role : ${roles}"
                        th:value="${role}"
                        th:text="${role.labelFr}"
                      ></option>
                    </select>
                    <input
                      name="weight"
                      type="number"
                      step="0.1"
                      min="20"
                      max="300"
                      class="input input-bordered"
                      placeholder="Poids (kg)"
                      required
                    />
                    <input
                      name="height"
                      type="number"
                      step="0.1"
                      min="50"
                      max="250"
                      class="input input-bordered"
                      placeholder="Taille (cm)"
                      required
                    />
                    <select name="sex" class="select select-bordered" required>
                      <option
                        th:each="sex : ${sexes}"
                        th:value="${sex}"
                        th:text="${sex.labelFr}"
                      ></option>
                    </select>
                    <select name="level" class="select select-bordered" required>
                      <option
                        th:each="level : ${levels}"
                        th:value="${level}"
                        th:text="${level.labelFr}"
                      ></option>
                    </select>
                    <input
                      name="birthDate"
                      type="date"
                      min="1900-01-01"
                      th:max="${T(java.time.LocalDate).now()}"
                      class="input input-bordered"
                    />
                    <input
                      name="profileImagePath"
                      class="input input-bordered md:col-span-2"
                      placeholder="Chemin avatar (optionnel)"
                      maxlength="255"
                    />
                    <select name="sportIds" multiple class="select select-bordered h-32">
                      <option
                        th:each="sport : ${sports}"
                        th:value="${sport.id}"
                        th:text="${sport.displayName}"
                      ></option>
                    </select>
                    <select name="badgeIds" multiple class="select select-bordered h-32">
                      <option
                        th:each="badge : ${badges}"
                        th:value="${badge.id}"
                        th:text="${badge.name}"
                      ></option>
                    </select>
                  </div>
                  <button type="submit" class="btn btn-primary mt-4">Créer</button>
                </form>

                <div class="space-y-3" th:if="${#lists.isEmpty(users)}">
                  <div class="alert"><span>Aucun utilisateur.</span></div>
                </div>
                <div class="space-y-3" th:unless="${#lists.isEmpty(users)}">
                  <details
                    th:each="user : ${users}"
                    class="collapse collapse-arrow border border-base-300 bg-base-100"
                  >
                    <summary class="collapse-title font-semibold">
                      #<span th:text="${user.id}">1</span> -
                      <span th:text="${user.firstname}">Prénom</span>
                      <span th:text="${user.lastname}">Nom</span>
                      (<span th:text="${user.email}">email@demo.local</span>)
                    </summary>
                    <div class="collapse-content space-y-4">
                      <form th:action="@{/admin/users/{id}/update(id=${user.id})}" method="post">
                        <div class="grid gap-3 md:grid-cols-2 xl:grid-cols-4">
                          <input
                            name="firstname"
                            class="input input-bordered"
                            th:value="${user.firstname}"
                            maxlength="80"
                            autocomplete="given-name"
                            required
                          />
                          <input
                            name="lastname"
                            class="input input-bordered"
                            th:value="${user.lastname}"
                            maxlength="80"
                            autocomplete="family-name"
                            required
                          />
                          <input
                            name="email"
                            type="email"
                            class="input input-bordered"
                            th:value="${user.email}"
                            maxlength="254"
                            autocomplete="email"
                            required
                          />
                          <input
                            name="password"
                            type="password"
                            class="input input-bordered"
                            placeholder="Nouveau mot de passe (optionnel)"
                            minlength="6"
                            maxlength="72"
                            autocomplete="new-password"
                          />
                          <select name="role" class="select select-bordered" required>
                            <option
                              th:each="role : ${roles}"
                              th:value="${role}"
                              th:text="${role.labelFr}"
                              th:selected="${role == user.role}"
                            ></option>
                          </select>
                          <input
                            name="weight"
                            type="number"
                            step="0.1"
                            min="20"
                            max="300"
                            class="input input-bordered"
                            th:value="${user.weight}"
                            required
                          />
                          <input
                            name="height"
                            type="number"
                            step="0.1"
                            min="50"
                            max="250"
                            class="input input-bordered"
                            th:value="${user.height}"
                            required
                          />
                          <select name="sex" class="select select-bordered" required>
                            <option
                              th:each="sex : ${sexes}"
                              th:value="${sex}"
                              th:text="${sex.labelFr}"
                              th:selected="${sex == user.sex}"
                            ></option>
                          </select>
                          <select name="level" class="select select-bordered" required>
                            <option
                              th:each="level : ${levels}"
                              th:value="${level}"
                              th:text="${level.labelFr}"
                              th:selected="${level == user.level}"
                            ></option>
                          </select>
                          <input
                            name="birthDate"
                            type="date"
                            min="1900-01-01"
                            th:max="${T(java.time.LocalDate).now()}"
                            class="input input-bordered"
                            th:value="${user.birthDate}"
                          />
                          <input
                            name="profileImagePath"
                            class="input input-bordered md:col-span-2"
                            maxlength="255"
                            th:value="${user.profileImagePath}"
                          />
                          <select name="sportIds" multiple class="select select-bordered h-32">
                            <option
                              th:each="sport : ${sports}"
                              th:value="${sport.id}"
                              th:text="${sport.displayName}"
                              th:selected="${user.sports != null and user.sports.contains(sport)}"
                            ></option>
                          </select>
                          <select name="badgeIds" multiple class="select select-bordered h-32">
                            <option
                              th:each="badge : ${badges}"
                              th:value="${badge.id}"
                              th:text="${badge.name}"
                              th:selected="${user.badges != null and user.badges.contains(badge)}"
                            ></option>
                          </select>
                        </div>
                        <button type="submit" class="btn btn-primary mt-4">Mettre à jour</button>
                      </form>

                      <form th:action="@{/admin/users/{id}/delete(id=${user.id})}" method="post">
                        <button type="submit" class="btn btn-error btn-outline">Supprimer</button>
                      </form>
                    </div>
                  </details>
                </div>
              </div>
            </section>
          </div>
        </main>

        <div th:replace="~{components/layout::footer}"></div>
      </div>
    </div>
  </body>
</html>
