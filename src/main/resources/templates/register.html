<!doctype html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
  <head th:replace="~{components/layout::head(title='Inscription - SportFlow')}">
    <title>Inscription - SportFlow</title>
  </head>

  <body class="bg-base-200 min-h-screen flex items-center justify-center p-4">
    <div class="card w-full max-w-lg shadow-2xl bg-base-100">
      <div class="card-body p-8">
        <h2 class="card-title text-3xl font-bold text-primary">Créer un compte</h2>
        <p class="text-sm text-base-content/70 mb-4">Rejoignez la communauté SportFlow.</p>

        <form th:action="@{/register}" th:object="${user}" method="post" class="space-y-4">
          <div class="form-control">
            <label class="label" for="email">
              <span class="label-text font-semibold">Email</span>
            </label>
            <input
              id="email"
              type="email"
              th:field="*{email}"
              placeholder="jean@example.com"
              class="input input-bordered focus:input-primary w-full"
              required
            />
          </div>

          <div class="form-control">
            <label class="label" for="password">
              <span class="label-text font-semibold">Mot de passe</span>
            </label>
            <input
              id="password"
              type="password"
              th:field="*{password}"
              placeholder="••••••••"
              class="input input-bordered focus:input-primary w-full"
              required
            />
          </div>

          <div class="divider text-xs text-base-content/40">Informations personnelles</div>

          <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <div class="form-control">
              <label class="label" for="firstname">
                <span class="label-text font-medium">Prénom</span>
              </label>
              <input
                id="firstname"
                type="text"
                th:field="*{firstname}"
                placeholder="Jean"
                class="input input-bordered focus:input-primary w-full"
                required
              />
            </div>
            <div class="form-control">
              <label class="label" for="lastname">
                <span class="label-text font-medium">Nom</span>
              </label>
              <input
                id="lastname"
                type="text"
                th:field="*{lastname}"
                placeholder="Dupont"
                class="input input-bordered focus:input-primary w-full"
                required
              />
            </div>
          </div>

          <div class="form-control">
            <label class="label" for="sex">
              <span class="label-text font-medium">Sexe</span>
            </label>
            <select
              id="sex"
              th:field="*{sex}"
              class="select select-bordered focus:select-primary w-full"
              required
            >
              <option value="" disabled selected>Sélectionnez votre sexe</option>
              <option
                th:each="s : ${T(web.sportflow.user.Sex).values()}"
                th:value="${s}"
                th:text="${s.labelFr}"
              ></option>
            </select>
          </div>

          <div class="grid grid-cols-2 gap-4">
            <div class="form-control">
              <label class="label" for="weight">
                <span class="label-text font-medium">Poids (kg)</span>
              </label>
              <input
                id="weight"
                type="number"
                step="0.1"
                th:field="*{weight}"
                placeholder="75"
                class="input input-bordered focus:input-primary w-full"
              />
            </div>
            <div class="form-control">
              <label class="label" for="height">
                <span class="label-text font-medium">Taille (cm)</span>
              </label>
              <input
                id="height"
                type="number"
                th:field="*{height}"
                placeholder="180"
                class="input input-bordered focus:input-primary w-full"
              />
            </div>
          </div>

          <div class="form-control mt-8">
            <button type="submit" class="btn btn-primary btn-block shadow-lg">S'inscrire</button>
          </div>
        </form>

        <div class="divider text-xs text-base-content/50 uppercase">Déjà inscrit ?</div>

        <div class="text-center">
          <a th:href="@{/login}" class="link link-hover link-primary text-sm font-bold">
            Se connecter à SportFlow
          </a>
        </div>
      </div>
    </div>
  </body>
</html>
