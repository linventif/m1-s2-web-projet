<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{components/layout::head(title='Ajouter un utilisateur')}">
  <title>Ajouter un utilisateur</title>
</head>

<body class="min-h-screen bg-base-200 text-base-content">
    <main class="mx-auto flex min-h-screen w-full max-w-6xl flex-col px-4 py-6 sm:px-6 lg:px-8">
        <section
            class="hero mb-6 overflow-hidden rounded-box bg-gradient-to-r from-secondary to-accent text-slate-950 shadow-xl">
            <div class="hero-content w-full justify-start px-6 py-8 sm:px-10">
                <div class="max-w-3xl">
                    <p class="mb-3 text-xs font-semibold uppercase tracking-[0.3em] text-slate-950">Create</p>
                    <h1 class="text-3xl font-black text-slate-950 sm:text-4xl">Ajouter un utilisateur</h1>
                    <p class="mt-3 text-sm text-slate-950 sm:text-base">Renseignez l'identite de l'utilisateur puis
                        selectionnez, si besoin, les conferences qu'il organise et celles auxquelles il participe.</p>
                </div>
            </div>
        </section>

        <section class="card border border-base-300 bg-base-100 shadow-xl">
            <div class="card-body p-6 sm:p-8">
                <form class="grid gap-6" th:action="@{/users/create}" th:object="${user}" method="post">
                    <div class="alert alert-error" th:if="${errorMessage != null}">
                        <span th:text="${errorMessage}">Erreur</span>
                    </div>

                    <label class="form-control w-full" for="firstname">
                        <div class="label">
                            <span class="label-text text-sm font-semibold">Prenom</span>
                        </div>
                        <input id="firstname" class="input input-bordered w-full" type="text" th:field="*{firstname}"
                            required>
                    </label>

                    <label class="form-control w-full" for="lastname">
                        <div class="label">
                            <span class="label-text text-sm font-semibold">Nom de Famille</span>
                        </div>
                        <input id="lastname" class="input input-bordered w-full" type="lastname" th:field="*{lastname}"
                            required>
                    </label>

                    <label class="form-control w-full" for="email">
                        <div class="label">
                            <span class="label-text text-sm font-semibold">Email</span>
                        </div>
                        <input id="email" class="input input-bordered w-full" type="email" th:field="*{email}" required>
                    </label>

                    <label class="form-control w-full" for="password">
                        <div class="label">
                            <span class="label-text text-sm font-semibold">Mot de passe</span>
                        </div>
                        <input id="password" class="input input-bordered w-full" name="password" type="password"
                            minlength="6" required>
                    </label>

                    <label class="form-control w-full" for="codeStatut">
                        <div class="label">
                            <span class="label-text text-sm font-semibold">Statut</span>
                        </div>
                        <select id="codeStatut" class="select select-bordered w-full" name="codeStatut" required>
                            <option value="" disabled selected>Choisir un statut</option>
                            <option th:each="statut : ${statuts}" th:value="${statut.codeStatut}"
                                th:text="${statut.nomStatut}"></option>
                        </select>
                    </label>

                    <div class="mt-2 flex flex-wrap gap-3">
                        <button class="btn btn-primary" type="submit">Ajouter</button>
                        <a class="btn btn-outline" th:href="@{/users}">Retour au menu</a>
                        <a class="btn btn-ghost" th:href="@{/users/login}">Se connecter</a>
                    </div>
                </form>
            </div>
        </section>
    </main>
</body>

</html>
