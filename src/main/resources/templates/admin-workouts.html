<!doctype html>
<html
  lang="fr"
  data-theme="emerald"
  xmlns:th="http://www.thymeleaf.org"
  xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
>
<head th:replace="~{components/layout::head(title='Administration - Activités')}">
  <title>Administration - Activités</title>
</head>

<body class="strava-shell min-h-screen text-base-content">
<div class="drawer">
  <input id="mobile-nav" type="checkbox" class="drawer-toggle"/>

  <div class="drawer-content min-h-screen">
    <div th:insert="~{components/layout::header}"></div>

    <main class="px-3 pb-8 pt-24 md:px-5">
      <div class="mx-auto max-w-[1600px] space-y-6">
        <section class="card rounded-[2rem] border border-base-300 bg-base-100 shadow-sm">
          <div class="card-body space-y-4">
            <h1 class="text-3xl font-black">Administration - Activités</h1>
            <div class="grid gap-2 sm:grid-cols-2 lg:grid-cols-4 xl:grid-cols-7">
              <a th:href="@{/admin/users}" class="btn btn-outline btn-sm rounded-full"
              >Utilisateurs</a
              >
              <a th:href="@{/admin/sports}" class="btn btn-outline btn-sm rounded-full"
              >Sports</a
              >
              <a
                th:href="@{/admin/workouts}"
                class="btn btn-outline btn-sm rounded-full btn-primary text-primary-content border-primary"
              >Activités</a
              >
              <a th:href="@{/admin/badges}" class="btn btn-outline btn-sm rounded-full"
              >Badges</a
              >
              <a th:href="@{/admin/goals}" class="btn btn-outline btn-sm rounded-full"
              >Objectifs</a
              >
              <a th:href="@{/admin/challenges}" class="btn btn-outline btn-sm rounded-full"
              >Défis</a
              >
              <a th:href="@{/admin/friendships}" class="btn btn-outline btn-sm rounded-full"
              >Amitiés</a
              >
            </div>

            <div th:if="${message}" class="alert alert-success">
              <span th:text="${message}"></span>
            </div>
            <div th:if="${errorMessage}" class="alert alert-error">
              <span th:text="${errorMessage}"></span>
            </div>
          </div>
        </section>

        <section class="card rounded-[2rem] border border-base-300 bg-base-100 shadow-sm">
          <div class="card-body space-y-4">
            <h2 class="card-title text-2xl">Activités</h2>

            <form
              th:action="@{/admin/workouts/create}"
              method="post"
              class="rounded-2xl bg-base-200 p-4"
            >
              <h3 class="mb-3 text-lg font-bold">Créer une activité</h3>
              <div class="grid gap-3 md:grid-cols-2 xl:grid-cols-4">
                <input
                  name="name"
                  class="input input-bordered"
                  placeholder="Nom"
                  required
                />
                <input
                  name="description"
                  class="input input-bordered md:col-span-2"
                  placeholder="Description (optionnel)"
                />
                <input
                  name="date"
                  type="datetime-local"
                  class="input input-bordered"
                  th:value="${#temporals.format(currentDateTime, 'yyyy-MM-dd''T''HH:mm')}"
                  required
                />
                <input
                  name="distance"
                  type="number"
                  step="0.1"
                  min="0.1"
                  class="input input-bordered"
                  placeholder="Distance (km)"
                  required
                />
                <input
                  name="duration"
                  type="number"
                  step="0.1"
                  min="0.1"
                  class="input input-bordered"
                  placeholder="Duree (min)"
                  required
                />
                <input
                  name="rating"
                  type="number"
                  step="0.5"
                  min="0.5"
                  max="5"
                  class="input input-bordered"
                  placeholder="Note (0.5-5, optionnel)"
                />
                <input
                  name="address"
                  class="input input-bordered md:col-span-2"
                  placeholder="Adresse (optionnel)"
                />
                <select name="sportId" class="select select-bordered" required>
                  <option value="" disabled selected>Choisir un sport</option>
                  <option
                    th:each="sport : ${sports}"
                    th:value="${sport.id}"
                    th:text="${sport.displayName}"
                  ></option>
                </select>
                <select name="userId" class="select select-bordered" required>
                  <option value="" disabled selected>Choisir un utilisateur</option>
                  <option
                    th:each="user : ${users}"
                    th:value="${user.id}"
                    th:text="${user.firstname + ' ' + user.lastname + ' (#' + user.id + ')'}"
                  ></option>
                </select>
              </div>
              <button type="submit" class="btn btn-primary mt-4">Créer</button>
            </form>

            <div class="space-y-3" th:if="${#lists.isEmpty(workouts)}">
              <div class="alert"><span>Aucune activité.</span></div>
            </div>
            <div class="space-y-3" th:unless="${#lists.isEmpty(workouts)}">
              <details
                th:each="workout : ${workouts}"
                class="collapse collapse-arrow border border-base-300 bg-base-100"
              >
                <summary class="collapse-title font-semibold">
                  #<span th:text="${workout.id}">1</span> -
                  <span
                    th:text="${workout.sport != null ? workout.sport.displayName : 'Sport inconnu'}"
                  >Sport</span
                  >
                  /
                  <span
                    th:text="${workout.user != null ? workout.user.firstname + ' ' + workout.user.lastname : 'Utilisateur inconnu'}"
                  >Utilisateur</span
                  >
                  - <span th:text="${workout.distance}">0</span> km
                </summary>
                <div class="collapse-content space-y-3">
                  <form
                    th:action="@{/admin/workouts/{id}/update(id=${workout.id})}"
                    method="post"
                    class="grid gap-3 md:grid-cols-2 xl:grid-cols-4"
                  >
                    <input
                      name="name"
                      class="input input-bordered"
                      th:value="${workout.name}"
                      required
                    />
                    <input
                      name="description"
                      class="input input-bordered md:col-span-2"
                      th:value="${workout.description}"
                      placeholder="Description (optionnel)"
                    />
                    <input
                      name="date"
                      type="datetime-local"
                      class="input input-bordered"
                      th:value="${#temporals.format(workout.date, 'yyyy-MM-dd''T''HH:mm')}"
                      required
                    />
                    <input
                      name="distance"
                      type="number"
                      step="0.1"
                      min="0.1"
                      class="input input-bordered"
                      th:value="${workout.distance}"
                      required
                    />
                    <input
                      name="duration"
                      type="number"
                      step="0.1"
                      min="0.1"
                      class="input input-bordered"
                      th:value="${workout.duration}"
                      required
                    />
                    <input
                      name="rating"
                      type="number"
                      step="0.5"
                      min="0.5"
                      max="5"
                      class="input input-bordered"
                      th:value="${workout.rating}"
                    />
                    <input
                      name="address"
                      class="input input-bordered md:col-span-2"
                      th:value="${workout.address}"
                    />
                    <select name="sportId" class="select select-bordered" required>
                      <option
                          th:each="sport : ${sports}"
                        th:value="${sport.id}"
                        th:text="${sport.displayName}"
                        th:selected="${workout.sport != null and sport != null and sport.id != null and workout.sport.id == sport.id}"
                      ></option>
                    </select>
                    <select name="userId" class="select select-bordered" required>
                      <option
                          th:each="user : ${users}"
                        th:value="${user.id}"
                        th:text="${user.firstname + ' ' + user.lastname + ' (#' + user.id + ')'}"
                        th:selected="${workout.user != null and user != null and user.id != null and workout.user.id == user.id}"
                      ></option>
                    </select>
                    <button type="submit" class="btn btn-primary">Mettre à jour</button>
                  </form>
                  <form
                    th:action="@{/admin/workouts/{id}/delete(id=${workout.id})}"
                    method="post"
                  >
                    <button type="submit" class="btn btn-error btn-outline">Supprimer</button>
                  </form>
                </div>
              </details>
            </div>
          </div>
        </section>
      </div>
    </main>

    <div th:replace="~{components/layout::footer}"></div>
  </div>
</div>
</body>
</html>
