<!doctype html>
<html
  lang="fr"
  data-theme="emerald"
  xmlns:th="http://www.thymeleaf.org"
  xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
>
  <head th:replace="~{components/layout::head(title='Admin - Goals')}">
    <title>Admin - Goals</title>
  </head>

  <body class="strava-shell min-h-screen text-base-content">
    <div class="drawer">
      <input id="mobile-nav" type="checkbox" class="drawer-toggle" />

      <div class="drawer-content min-h-screen">
        <div th:insert="~{components/layout::header}"></div>

        <main class="px-3 pb-8 pt-24 md:px-5">
          <div class="mx-auto max-w-[1600px] space-y-6">
            <section class="card rounded-[2rem] border border-base-300 bg-base-100 shadow-sm">
              <div class="card-body space-y-4">
                <h1 class="text-3xl font-black">Administration - Objectifs</h1>
                <div class="grid gap-2 sm:grid-cols-2 lg:grid-cols-4 xl:grid-cols-7">
                  <a th:href="@{/admin/users}" class="btn btn-outline btn-sm rounded-full">Users</a>
                  <a th:href="@{/admin/sports}" class="btn btn-outline btn-sm rounded-full"
                    >Sports</a
                  >
                  <a th:href="@{/admin/workouts}" class="btn btn-outline btn-sm rounded-full"
                    >Workouts</a
                  >
                  <a th:href="@{/admin/badges}" class="btn btn-outline btn-sm rounded-full"
                    >Badges</a
                  >
                  <a
                    th:href="@{/admin/goals}"
                    class="btn btn-outline btn-sm rounded-full btn-primary text-primary-content border-primary"
                    >Objectifs</a
                  >
                  <a th:href="@{/admin/challenges}" class="btn btn-outline btn-sm rounded-full"
                    >Challenges</a
                  >
                  <a th:href="@{/admin/friendships}" class="btn btn-outline btn-sm rounded-full"
                    >Friendships</a
                  >
                </div>

                <div th:if="${message}" class="alert alert-success">
                  <span th:text="${message}"></span>
                </div>
                <div th:if="${errorMessage}" class="alert alert-error">
                  <span th:text="${errorMessage}"></span>
                </div>
              </div>
            </section>

            <section class="card rounded-[2rem] border border-base-300 bg-base-100 shadow-sm">
              <div class="card-body space-y-4">
                <h2 class="card-title text-2xl">Objectifs</h2>

                <form
                  th:action="@{/admin/goals/create}"
                  method="post"
                  class="rounded-2xl bg-base-200 p-4"
                >
                  <h3 class="mb-3 text-lg font-bold">Creer un objectif</h3>
                  <div class="grid gap-3 md:grid-cols-2 xl:grid-cols-4">
                    <input
                      name="label"
                      class="input input-bordered md:col-span-2"
                      placeholder="Libelle"
                      required
                    />
                    <select name="type" class="select select-bordered" required>
                      <option
                        th:each="goalType : ${goalTypes}"
                        th:value="${goalType}"
                        th:text="${goalType}"
                      ></option>
                    </select>
                    <input name="unit" class="input input-bordered" placeholder="Unite" required />
                    <input
                      name="targetValue"
                      type="number"
                      step="0.1"
                      min="0.1"
                      class="input input-bordered"
                      placeholder="Cible"
                      required
                    />
                    <input
                      name="currentValue"
                      type="number"
                      step="0.1"
                      min="0"
                      class="input input-bordered"
                      placeholder="Valeur actuelle"
                      required
                    />
                    <select name="userId" class="select select-bordered md:col-span-2" required>
                      <option value="" disabled selected>Choisir le proprietaire</option>
                      <option
                        th:each="user : ${users.?[#this != null]}"
                        th:value="${user.id}"
                        th:text="${user.firstname + ' ' + user.lastname + ' (#' + user.id + ')'}"
                      ></option>
                    </select>
                  </div>
                  <button type="submit" class="btn btn-primary mt-4">Creer</button>
                </form>

                <div class="space-y-3" th:if="${#lists.isEmpty(goals)}">
                  <div class="alert"><span>Aucun objectif.</span></div>
                </div>
                <div class="space-y-3" th:unless="${#lists.isEmpty(goals)}">
                  <details
                    th:each="goal : ${goals.?[#this != null]}"
                    class="collapse collapse-arrow border border-base-300 bg-base-100"
                  >
                    <summary class="collapse-title font-semibold">
                      #<span th:text="${goal.id}">1</span> -
                      <span th:text="${goal.label}">Objectif</span>
                      (<span
                        th:text="${goal.user != null ? goal.user.firstname + ' ' + goal.user.lastname : 'Utilisateur inconnu'}"
                        >User</span
                      >)
                    </summary>
                    <div class="collapse-content space-y-3">
                      <form
                        th:action="@{/admin/goals/{id}/update(id=${goal.id})}"
                        method="post"
                        class="grid gap-3 md:grid-cols-2 xl:grid-cols-4"
                      >
                        <input
                          name="label"
                          class="input input-bordered md:col-span-2"
                          th:value="${goal.label}"
                          required
                        />
                        <select name="type" class="select select-bordered" required>
                          <option
                            th:each="goalType : ${goalTypes}"
                            th:value="${goalType}"
                            th:text="${goalType}"
                            th:selected="${goalType == goal.type}"
                          ></option>
                        </select>
                        <input
                          name="unit"
                          class="input input-bordered"
                          th:value="${goal.unit}"
                          required
                        />
                        <input
                          name="targetValue"
                          type="number"
                          step="0.1"
                          min="0.1"
                          class="input input-bordered"
                          th:value="${goal.targetValue}"
                          required
                        />
                        <input
                          name="currentValue"
                          type="number"
                          step="0.1"
                          min="0"
                          class="input input-bordered"
                          th:value="${goal.currentValue}"
                          required
                        />
                        <select name="userId" class="select select-bordered md:col-span-2" required>
                          <option
                            th:each="user : ${users.?[#this != null]}"
                            th:value="${user.id}"
                            th:text="${user.firstname + ' ' + user.lastname + ' (#' + user.id + ')'}"
                            th:selected="${goal.user != null and user != null and user.id != null and goal.user.id == user.id}"
                          ></option>
                        </select>
                        <button type="submit" class="btn btn-primary">Mettre a jour</button>
                      </form>
                      <form th:action="@{/admin/goals/{id}/delete(id=${goal.id})}" method="post">
                        <button type="submit" class="btn btn-error btn-outline">Supprimer</button>
                      </form>
                    </div>
                  </details>
                </div>
              </div>
            </section>
          </div>
        </main>

        <div th:replace="~{components/layout::footer}"></div>
      </div>
    </div>
  </body>
</html>
