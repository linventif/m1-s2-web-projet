name: CI

on:
  push:
    branches:
      - '**'
  pull_request:

jobs:
  tests:
    name: Tests
    runs-on: ubuntu-latest
    env:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Cache Sonar packages
        uses: actions/cache@v4
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar

      - name: Run all tests
        run: mvn -B clean verify

      - name: Add coverage summary
        run: |
          COVERAGE=$(awk -F',' 'NR > 1 { missed += $4; covered += $5 } END { total = missed + covered; if (total == 0) { print 100 } else { printf "%d\n", int((covered * 100 + total / 2) / total) } }' target/site/jacoco/jacoco.csv)
          echo "JaCoCo coverage: ${COVERAGE}%" >> "$GITHUB_STEP_SUMMARY"

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: target/site/jacoco

      - name: Run Sonar analysis
        if: env.SONAR_TOKEN != '' && env.SONAR_HOST_URL != ''
        run: |
          mvn -B sonar:sonar \
            -Dsonar.projectKey=linventif_m1-s2-indu_AZzXDvGQXwM5IsPrSNyK \
            -Dsonar.host.url=$SONAR_HOST_URL \
            -Dsonar.token=$SONAR_TOKEN
